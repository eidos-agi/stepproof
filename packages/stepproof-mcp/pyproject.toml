[project]
name = "stepproof-mcp"
version = "0.0.1"
description = "StepProof MCP server — exposes StepProof governance over Model Context Protocol"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "BUSL-1.1" }
authors = [{ name = "Eidos AGI", email = "daniel@eidosagi.com" }]

dependencies = [
    "mcp>=1.2",
    "httpx>=0.27",
    "pydantic>=2.9",
    "stepproof-runtime",
]

[project.scripts]
stepproof-mcp = "stepproof_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stepproof_mcp"]
