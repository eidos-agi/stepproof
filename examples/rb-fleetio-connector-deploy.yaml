# the case study-specific runbook: deploy a new vendor connector (Fleetio) to
# the data-daemon pipeline. Modeled directly on Session 34 (see
# docs/CASE_STUDY.md). Each step maps to a the case study incident
# StepProof would have caught.

template_id: rb-fleetio-connector-deploy
version: 1.0.0
name: Deploy new Fleetio vendor connector to data-daemon
description: >
  Ship a new vendor connector through the full pipeline: PR review, CI,
  migration via sanctioned tooling, staging deploy with connector-registry
  verification, zombie-detection, row-count verification, then production.
risk_level: high
allowed_environments: [staging, production]
requires_human_signoff: true

steps:
  - step_id: s1
    description: Open PR with FleetioConnector implementation
    allowed_tools: [Edit, Write, git, mcp__github__create_pull_request]
    required_evidence: [branch_name, pr_url]
    verification_method: verify_pr_opened
    verification_tier: tier1
    timeout_seconds: 3600
    on_fail: retry
    on_fail_max_retries: 2

  - step_id: s2
    description: CI tests pass on PR
    allowed_tools: [ci_cli]
    required_evidence: [ci_run_id]
    verification_method: verify_ci_green
    verification_tier: tier1
    timeout_seconds: 1800
    on_fail: block

  - step_id: s3
    description: PR approved by reviewer
    allowed_tools: [mcp__github__add_issue_comment]
    required_evidence: [pr_url, approval_count]
    verification_method: verify_pr_approved
    verification_tier: tier1
    timeout_seconds: 86400
    on_fail: block

  - step_id: s4
    description: Apply bronze.fleetio migration via cerebro-migrate-staging
    allowed_tools: [cerebro_migrate_staging]
    denied_tools: [psql, pg_dump, pg_restore]
    required_evidence: [migration_name, staging_db_id, deploy_id]
    verification_method: verify_migration_applied
    verification_tier: tier1
    timeout_seconds: 600
    on_fail: escalate_human

  - step_id: s5
    description: Deploy data-daemon to staging via GitHub Actions (develop branch)
    allowed_tools: [mcp__github__create_or_update_file]
    required_evidence: [deploy_id, declared_env, database_url_env]
    verification_method: verify_env_isolation
    verification_tier: tier1
    timeout_seconds: 900
    on_fail: escalate_human

  - step_id: s6
    description: Verify connector registry contains fleetio after staging deploy
    allowed_tools: [log_reader, railguey_logs]
    required_evidence: [expected_connector, connector_registry, deploy_id]
    verification_method: verify_connector_registry
    verification_tier: tier1
    timeout_seconds: 600
    on_fail: escalate_human

  - step_id: s7
    description: Verify single active deployment (no zombies)
    allowed_tools: [railguey_deployments]
    required_evidence: [active_deployment_count, deploy_id]
    verification_method: verify_single_active_deployment
    verification_tier: tier1
    timeout_seconds: 300
    on_fail: escalate_human

  - step_id: s8
    description: Trigger extraction and verify row counts match across Fleetio tables
    allowed_tools: [http_probe, data_daemon_api]
    required_evidence: [rows_extracted, rows_loaded]
    verification_method: verify_row_counts_match
    verification_tier: tier1
    timeout_seconds: 1800
    on_fail: escalate_human

  - step_id: s9
    description: Deploy to production (main branch)
    allowed_tools: [mcp__github__merge_pull_request]
    required_evidence: [deploy_id, declared_env, database_url_env]
    verification_method: verify_env_isolation
    verification_tier: tier1
    timeout_seconds: 900
    on_fail: escalate_human

  - step_id: s10
    description: Production health + connector registry verification
    allowed_tools: [log_reader, railguey_logs]
    required_evidence: [expected_connector, connector_registry, deploy_id]
    verification_method: verify_connector_registry
    verification_tier: tier1
    timeout_seconds: 900
    on_fail: escalate_human
