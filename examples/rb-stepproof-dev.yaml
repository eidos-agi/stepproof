# StepProof's own SDLC runbook — the repo dogfoods its own enforcement.
# Phase 2b shipped; the bootstrap constraint is lifted. Development work
# on this repo now runs under this runbook, started via:
#
#   stepproof run start rb-stepproof-dev
#
# Each step's allowed_tools is narrow by design. If a legitimate flow
# needs a tool outside the current step, fix the step (or the plan) —
# do not add an override. That's the thesis being tested on itself.

template_id: rb-stepproof-dev
version: 1.0.0
name: StepProof SDLC — test-first, verified, committed
description: >
  Gated development cycle for this repository. Every change moves
  through: plan → failing test → implementation → full suite green →
  docs → commit → (optional) push. Each transition requires evidence
  the verifier can check against real state.
risk_level: low
allowed_environments: [staging]

steps:
  - step_id: s1
    description: Declare intent — what is being built or fixed
    allowed_tools:
      - Read
      - Glob
      - Grep
      - LS
      - TodoWrite
      - NotebookRead
    required_evidence: [intent_summary, scope]
    verification_method: verify_pr_opened   # stub — the summary + scope are the "PR"
    verification_tier: tier1
    timeout_seconds: 600
    on_fail: escalate_human

  - step_id: s2
    description: Write a failing test that captures the desired behavior
    allowed_tools:
      - Read
      - Grep
      - Glob
      - LS
      - Write
      - Edit
      - TodoWrite
    required_evidence: [path, min_lines]
    verification_method: verify_file_exists
    verification_tier: tier1
    timeout_seconds: 1800
    on_fail: retry
    on_fail_max_retries: 2

  - step_id: s3
    description: Implement the change to make the test pass
    allowed_tools:
      - Read
      - Grep
      - Glob
      - LS
      - Write
      - Edit
      - MultiEdit
      - TodoWrite
    required_evidence: [path, min_lines]
    verification_method: verify_file_exists
    verification_tier: tier1
    timeout_seconds: 3600
    on_fail: retry
    on_fail_max_retries: 3

  - step_id: s4
    description: Full pytest suite green — ≥145 tests, zero failures
    allowed_tools:
      - Bash
      - Read
    required_evidence: [pytest_output_path, min_passed]
    verification_method: verify_pytest_passed
    verification_tier: tier1
    timeout_seconds: 600
    on_fail: retry
    on_fail_max_retries: 2

  - step_id: s5
    description: Sync user-visible docs if the change is user-visible
    allowed_tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
    required_evidence: [path, min_lines]
    verification_method: verify_file_exists
    verification_tier: tier1
    timeout_seconds: 1800
    on_fail: retry
    on_fail_max_retries: 2

  - step_id: s6
    description: Commit with a properly-formatted message
    allowed_tools:
      - Bash
      - Read
    required_evidence: [commit_sha]
    verification_method: verify_git_commit
    verification_tier: tier1
    timeout_seconds: 300
    on_fail: escalate_human

  - step_id: s7
    description: Push to origin (optional — skip with run_abandon if local-only)
    allowed_tools:
      - Bash
      - Read
    required_evidence: [commit_sha]
    verification_method: verify_git_commit
    verification_tier: tier1
    timeout_seconds: 300
    on_fail: escalate_human
