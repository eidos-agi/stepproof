# Secret rotation runbook. Rotate a production credential without breaking
# dependent services. Ring 3, requires sign-off.

template_id: rb-secret-rotation
version: 1.0.0
name: Rotate production secret
description: >
  Rotate a production credential: issue new version, update consumers,
  verify they pick up the new version, invalidate the old. Each step
  requires evidence (not just "done").
risk_level: high
allowed_environments: [production]
requires_human_signoff: true

steps:
  - step_id: s1
    description: Issue new secret version in the vault
    allowed_tools: [mcp__vault__set]
    required_evidence: [secret_id, new_version]
    verification_method: verify_secret_rotated
    verification_tier: tier1
    timeout_seconds: 600
    on_fail: block

  - step_id: s2
    description: Update consumer services to reference new version
    allowed_tools: [railguey_variable_set]
    required_evidence: [secret_id, new_version, old_invalidated]
    verification_method: verify_secret_rotated
    verification_tier: tier1
    timeout_seconds: 1800
    on_fail: escalate_human

  - step_id: s3
    description: Confirm consumers healthy after rotation
    allowed_tools: [http_probe, log_reader]
    required_evidence: [deploy_id, active_deployment_count]
    verification_method: verify_single_active_deployment
    verification_tier: tier1
    timeout_seconds: 600
    on_fail: escalate_human
